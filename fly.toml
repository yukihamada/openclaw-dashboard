# fly.toml app configuration file generated for openclaw-dashboard-still-sun-5403 on 2026-03-14T13:12:30+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'openclaw-dashboard-still-sun-5403'
primary_region = 'nrt'

[build]

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[mounts]]
  source = "dashboard_data"
  destination = "/data"
