<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — OpenClaw</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#09090b;--surface:#18181b;--border:#27272a;--text:#fafafa;--muted:#a1a1aa;--dim:#52525b;--green:#22c55e;--yellow:#eab308;--red:#ef4444;}
body{font-family:'Geist','Noto Sans JP',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
nav{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:20px;position:sticky;top:0;background:rgba(9,9,11,0.92);backdrop-filter:blur(12px);z-index:50;}
.logo{font-size:14px;font-weight:600;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px;}
.nav-links{display:flex;gap:2px;}
.nav-links a{font-size:13px;color:var(--muted);text-decoration:none;padding:5px 10px;border-radius:6px;transition:color 0.15s;}
.nav-links a:hover,.nav-links a.active{color:var(--text);}
.page{max-width:960px;margin:0 auto;padding:48px 24px 80px;}
.page-title{font-size:20px;font-weight:600;letter-spacing:-0.3px;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:32px;}
.section-title{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.projects{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:40px;}
.project-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;transition:border-color 0.15s;}
.project-card:hover{border-color:#3f3f46;}
.project-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.project-name{font-size:14px;font-weight:600;letter-spacing:-0.2px;}
.project-emoji{font-size:20px;}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.status-dot.up{background:var(--green);}
.status-dot.down{background:var(--red);}
.status-dot.slow{background:var(--yellow);}
.project-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px;}
.project-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.tag{font-size:11px;color:var(--dim);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 7px;}
.project-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-top:12px;border-top:1px solid var(--border);}
.metric{display:flex;flex-direction:column;gap:2px;}
.metric-val{font-size:15px;font-weight:600;letter-spacing:-0.3px;}
.metric-label{font-size:11px;color:var(--dim);}
.project-link{font-size:12px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:4px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
.project-link:hover{color:var(--text);}
.arrow{font-size:10px;}
@media(max-width:600px){nav{padding:0 16px;}.page{padding:32px 16px 60px;}.projects{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav>
  <a class="logo" href="/"><span>🦞</span> OpenClaw</a>
  <div class="nav-links">
    <a href="/">Dashboard</a>
    <a href="/projects.html" class="active">Projects</a>
    <a href="/analytics.html">Analytics</a>
    <a href="/blog.html">Blog</a>
    <a href="/status.html">Status</a>
  </div>
</nav>

<div class="page">
  <div class="page-title">Projects</div>
  <div class="page-sub">イネブラ傘下プロダクト一覧 — AIエージェントが監視・改善中</div>

  <div class="section-title">Tier 1 — 主力プロダクト</div>
  <div class="projects" id="tier1"></div>

  <div class="section-title">Tier 2 — 成長中</div>
  <div class="projects" id="tier2"></div>
</div>

<script>
const PRODUCTS = [
  // Tier 1
  {tier:1, emoji:'💬', name:'chatweb.ai', url:'https://chatweb.ai', desc:'GPT-4o・Claude・Geminiをひとつの画面で使えるマルチモデルAIチャット。Lambda(ARM64)で低コスト運用。', tags:['Rust','Lambda','AI Chat'], metrics:[{val:'50+', label:'Daily Users'},{val:'¥1,980', label:'Pro/月'}]},
  {tier:1, emoji:'🤖', name:'teai.io', url:'https://teai.io', desc:'日本語特化AIチャット。Nemotronモデル搭載、teai APIとして開発者向けにも提供。', tags:['Rust','Lambda','Japanese AI'], metrics:[{val:'$29', label:'Pro/月(USD)'},{val:'3プラン', label:'料金体系'}]},
  {tier:1, emoji:'🏠', name:'StayFlow', url:'https://stayflowapp.com', desc:'民泊・宿泊施設の予約管理・運営自動化。Beds24連携で複数チャネルを一元管理。', tags:['React','Supabase','Stripe'], metrics:[{val:'1,860+', label:'月間UV'},{val:'500+', label:'導入施設'}]},
  {tier:1, emoji:'📊', name:'BANTO', url:'https://banto.work', desc:'建設業向け見積書・請求書管理。声だけで書類作成、インボイス・電帳法対応。', tags:['React','Fly.io','建設業'], metrics:[{val:'先着100社', label:'5年間無料'},{val:'¥0', label:'現在'}]},
  {tier:1, emoji:'🥋', name:'JiuFlow', url:'https://jiuflow.art', desc:'柔術・グラップリング技術を動画で学べるプラットフォーム。世界トップ選手の映像を体系的に提供。', tags:['React','Rust SSR','Sports'], metrics:[{val:'100+', label:'選手'},{val:'¥980', label:'Premium/月'}]},
  {tier:1, emoji:'📱', name:'Elio', url:'https://elio.love', desc:'P2P分散推論対応のiOSチャットアプリ。Solana EBR Token Gate、PII Filterを実装。', tags:['Swift','iOS','P2P AI'], metrics:[{val:'App Store', label:'配信中'},{val:'2,920', label:'Swiftコード行数'}]},
  // Tier 2
  {tier:2, emoji:'🏪', name:'ミセバンAI', url:'https://misebanai.com', desc:'AI活用の店舗・ビジネス支援プラットフォーム。Rust 4クレートで構成。', tags:['Rust','Fly.io','ビジネス'], metrics:[{val:'Fly.io', label:'東京リージョン'},{val:'4 crates', label:'Rust'}]},
  {tier:2, emoji:'🌐', name:'EnablerDAO', url:'https://enablerdao.com', desc:'1人+AIで8つのプロダクトを運営するDAO。Rust/Spin WASM、ENAI Solanaトークン。', tags:['Rust','Spin','Solana'], metrics:[{val:'119', label:'月間UV'},{val:'ENAI', label:'Solanaトークン'}]},
  {tier:2, emoji:'🌙', name:'SOLUNA', url:'https://solun.art', desc:'Next.js 16で構築された実験的アートプロジェクト。Fly.io（東京）にデプロイ。', tags:['Next.js','Fly.io','Art'], metrics:[{val:'Fly.io', label:'東京'},{val:'Next.js 16', label:''}]},
  {tier:2, emoji:'👤', name:'yukihamada.jp', url:'https://yukihamada.jp', desc:'Leptos/Rust SSRで構築された個人サイト。プロダクト紹介・ブログ機能。', tags:['Rust','Leptos','SSR'], metrics:[{val:'Fly.io', label:'東京'},{val:'Rust SSR', label:''}]},
];

const ago = ts => {
  const m = Math.floor((Date.now()-ts)/60000);
  if(m<1) return 'just now'; if(m<60) return m+'m ago';
  if(m<1440) return Math.floor(m/60)+'h ago'; return Math.floor(m/1440)+'d ago';
};

async function load() {
  // Get health data
  const health = await fetch('/api/health').then(r=>r.json()).catch(()=>({}));
  const services = Array.isArray(health) ? health : (health.services || []);

  function statusFor(url) {
    const domain = url.replace('https://','').split('/')[0];
    const svc = services.find(s => s.url && s.url.includes(domain));
    if (!svc) return {cls:'up', label:'稼働中', latency:''};
    if (svc.status !== 'up') return {cls:'down', label:'ダウン', latency:''};
    const ms = svc.latency || 0;
    if (ms > 2000) return {cls:'slow', label:'低速', latency: ms+'ms'};
    return {cls:'up', label:'稼働中', latency: ms ? ms+'ms' : ''};
  }

  function renderCards(tier, containerId) {
    const prods = PRODUCTS.filter(p => p.tier === tier);
    document.getElementById(containerId).innerHTML = prods.map(p => {
      const st = statusFor(p.url);
      return `<div class="project-card">
        <div class="project-header">
          <span class="project-emoji">${p.emoji}</span>
          <span class="status-dot ${st.cls}" title="${st.label}${st.latency ? ' · '+st.latency : ''}"></span>
        </div>
        <div class="project-name">${p.name}</div>
        <div class="project-desc">${p.desc}</div>
        <div class="project-tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <div class="project-metrics">
          ${p.metrics.map(m=>`<div class="metric"><div class="metric-val">${m.val}</div><div class="metric-label">${m.label}</div></div>`).join('')}
        </div>
        <a class="project-link" href="${p.url}" target="_blank">${p.url.replace('https://','')}<span class="arrow">↗</span></a>
      </div>`;
    }).join('');
  }

  renderCards(1, 'tier1');
  renderCards(2, 'tier2');
}
load();
</script>
</body>
</html>
