<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — OpenClaw</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#060910;--surface:#0e1420;--border:rgba(99,179,237,0.15);--accent:#63b3ed;--text:#e2e8f0;--muted:#718096;--muted2:#4a5568;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 40%,rgba(99,179,237,0.06) 0%,transparent 60%),radial-gradient(ellipse at 70% 60%,rgba(167,139,250,0.07) 0%,transparent 60%);pointer-events:none;}
.card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center;}
.logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#63b3ed,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 24px rgba(99,179,237,0.4);}
.logo-text{font-size:18px;font-weight:700;}
h2{font-size:20px;font-weight:700;margin-bottom:6px;text-align:center;}
.sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;}
label{font-size:12px;color:var(--muted2);font-weight:500;display:block;margin-bottom:6px;}
input{width:100%;padding:12px 16px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);font-size:14px;outline:none;transition:border-color 0.2s;margin-bottom:20px;font-family:inherit;}
input:focus{border-color:rgba(99,179,237,0.5);box-shadow:0 0 0 3px rgba(99,179,237,0.1);}
button{width:100%;padding:13px;border-radius:10px;background:var(--accent);color:#060910;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all 0.2s;}
button:hover{background:#4dabdb;box-shadow:0 0 20px rgba(99,179,237,0.4);}
button:disabled{opacity:0.5;cursor:not-allowed;}
.error{color:#fc8181;font-size:12px;margin-top:10px;text-align:center;min-height:18px;}
.back{display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--muted);text-decoration:none;}
.back:hover{color:var(--text);}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><div class="logo-icon">🦞</div><span class="logo-text">OpenClaw</span></div>
  <h2>管理者ログイン</h2>
  <p class="sub">タスクの削除・設定変更にはログインが必要です</p>
  <label for="pass">パスワード</label>
  <input type="password" id="pass" placeholder="••••••••••" onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()" id="btn">ログイン</button>
  <div class="error" id="err"></div>
  <a class="back" href="/">← ダッシュボードに戻る</a>
</div>
<script>
async function login() {
  const pass = document.getElementById('pass').value;
  const btn = document.getElementById('btn');
  if (!pass) return;
  btn.disabled = true; btn.textContent = '認証中...';
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pass })
    });
    if (res.ok) {
      const { token } = await res.json();
      localStorage.setItem('openclaw-admin-token', token);
      const back = new URLSearchParams(location.search).get('back') || '/';
      location.href = back;
    } else {
      document.getElementById('err').textContent = '❌ パスワードが違います';
      btn.disabled = false; btn.textContent = 'ログイン';
    }
  } catch(e) {
    document.getElementById('err').textContent = 'エラー: '+e.message;
    btn.disabled = false; btn.textContent = 'ログイン';
  }
}
// Already logged in?
const t = localStorage.getItem('openclaw-admin-token');
if (t) location.href = new URLSearchParams(location.search).get('back') || '/';
</script>
</body>
</html>
