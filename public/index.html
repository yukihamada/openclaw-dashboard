<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Dashboard</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#09090b;--s1:#18181b;--s2:#27272a;--border:#27272a;--text:#fafafa;--muted:#a1a1aa;--dim:#52525b;--green:#22c55e;--yellow:#eab308;--red:#ef4444;}
body{font-family:'Geist','Noto Sans JP',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
nav{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:20px;position:sticky;top:0;background:rgba(9,9,11,0.92);backdrop-filter:blur(12px);z-index:50;}
.logo{font-size:14px;font-weight:600;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px;}
.nav-links{display:flex;gap:2px;}
.nav-links a{font-size:13px;color:var(--muted);text-decoration:none;padding:5px 10px;border-radius:6px;transition:color 0.15s;}
.nav-links a:hover,.nav-links a.active{color:var(--text);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.live-time{font-size:12px;color:var(--dim);}

main{max-width:1100px;margin:0 auto;padding:32px 24px 80px;}
.section{margin-top:40px;}
.section:first-child{margin-top:0;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-size:12px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;}
.section-link{font-size:12px;color:var(--muted);text-decoration:none;transition:color .15s;}
.section-link:hover{color:var(--text);}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:700px){.kpis{grid-template-columns:repeat(2,1fr);}}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.kpi-label{font-size:11px;color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
.kpi-val{font-size:28px;font-weight:700;letter-spacing:-1px;color:var(--text);}
.kpi-val.green{color:var(--green);}
.kpi-val.yellow{color:var(--yellow);}

/* Agents */
.agents{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;}
.agent{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .15s;}
.agent:hover{border-color:#3f3f46;}
.agent-top{padding:14px 14px 10px;}
.agent-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.agent-emoji{font-size:20px;width:32px;height:32px;background:var(--s2);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.agent-name{font-size:13px;font-weight:600;}
.agent-role{font-size:11px;color:var(--muted);}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-left:auto;}
.dot.on{background:var(--green);}
.dot.off{background:var(--dim);}
.agent-task{font-size:12px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 10px;line-height:1.5;min-height:32px;margin-bottom:8px;}
.agent-foot{padding:8px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.agent-ip{font-size:11px;color:var(--dim);font-family:monospace;}
.agent-seen{font-size:11px;color:var(--dim);}

/* Tasks */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:700px){.board{grid-template-columns:1fr;}}
.col{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.col-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.col-title{font-size:12px;font-weight:600;color:var(--muted);}
.col-count{font-size:11px;color:var(--dim);background:var(--s2);border-radius:10px;padding:1px 8px;}
.col-body{padding:8px;}
.task{background:var(--s2);border-radius:7px;padding:9px 10px;margin-bottom:6px;position:relative;}
.task:last-child{margin-bottom:0;}
.task-title{font-size:12px;font-weight:500;line-height:1.4;padding-right:16px;}
.task-meta{font-size:11px;color:var(--dim);margin-top:4px;}
.task-del{position:absolute;top:8px;right:8px;background:none;border:none;font-size:11px;color:var(--dim);cursor:pointer;opacity:0;transition:opacity .15s;}
.task:hover .task-del{opacity:1;}
.task-del:hover{color:var(--red);}
.col-empty{font-size:12px;color:var(--dim);text-align:center;padding:16px 8px;}

/* Add task */
.add-form{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:18px;margin-top:10px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:700px){.form-row{grid-template-columns:1fr;}}
.form-full{grid-column:1/-1;}
.label{font-size:11px;color:var(--dim);margin-bottom:4px;font-weight:500;}
input,select{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;width:100%;transition:border-color .15s;}
input::placeholder{color:var(--dim);}
input:focus,select:focus{border-color:#3f3f46;}
select option{background:var(--s2);}
.form-actions{grid-column:1/-1;display:flex;justify-content:flex-end;gap:8px;margin-top:4px;}
.btn{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:none;color:var(--muted);transition:all .15s;}
.btn:hover{color:var(--text);border-color:#3f3f46;}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text);}
.btn-primary:hover{background:#d4d4d8;border-color:#d4d4d8;}

/* Blog mini */
.posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:700px){.posts-grid{grid-template-columns:1fr;}}
.mini-post{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:border-color .15s;}
.mini-post:hover{border-color:#3f3f46;}
.mini-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.mini-av{width:18px;height:18px;border-radius:4px;font-size:10px;background:var(--s2);display:flex;align-items:center;justify-content:center;}
.mini-auth{font-size:11px;color:var(--muted);}
.mini-ago{font-size:11px;color:var(--dim);margin-left:auto;}
.mini-title{font-size:13px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text);opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;z-index:99;}
.toast.show{opacity:1;transform:translateY(0);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--s2);border-radius:2px;}
@media(max-width:600px){nav{padding:0 16px;}main{padding:20px 16px 60px;}}
</style>
</head>
<body>
<nav>
  <a class="logo" href="/">🦞 OpenClaw</a>
  <div class="nav-links">
    <a href="/" class="active">Dashboard</a>
    <a href="/blog.html">Blog</a>
    <a href="/projects.html">Projects</a>
    <a href="/analytics.html">Analytics</a>
    <a href="/metrics.html">Metrics</a>
    <a href="/agent.html">Agents</a>
    <a href="/status.html">Status</a>
  </div>
  <div class="nav-right">
    <span class="live-dot"></span>
    <span class="live-time" id="live-time">—</span>
  </div>
</nav>

<main>
  <div class="section">
    <div class="kpis">
      <div class="kpi"><div class="kpi-label">Agents Online</div><div class="kpi-val green" id="kpi-agents">—</div></div>
      <div class="kpi"><div class="kpi-label">Tasks Done</div><div class="kpi-val" id="kpi-done">—</div></div>
      <div class="kpi"><div class="kpi-label">In Progress</div><div class="kpi-val yellow" id="kpi-prog">—</div></div>
      <div class="kpi"><div class="kpi-label">Blog Posts</div><div class="kpi-val" id="kpi-blogs">—</div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-head"><span class="section-title">Agents</span></div>
    <div class="agents" id="agents"></div>
  </div>

  <div class="section">
    <div class="section-head"><span class="section-title">Tasks</span></div>
    <div class="board">
      <div class="col">
        <div class="col-head"><span class="col-title">Todo</span><span class="col-count" id="c-todo">0</span></div>
        <div class="col-body" id="b-todo"></div>
      </div>
      <div class="col">
        <div class="col-head"><span class="col-title">In Progress</span><span class="col-count" id="c-prog">0</span></div>
        <div class="col-body" id="b-prog"></div>
      </div>
      <div class="col">
        <div class="col-head"><span class="col-title">Done</span><span class="col-count" id="c-done">0</span></div>
        <div class="col-body" id="b-done"></div>
      </div>
    </div>
    <div class="add-form">
      <div class="form-row">
        <div class="form-full"><div class="label">タイトル</div><input id="f-title" placeholder="タスクを入力..."></div>
        <div><div class="label">担当</div>
          <select id="f-agent">
            <option value="Sou">📋 Sou</option>
            <option value="Depu">🚀 Depu</option>
            <option value="Saku">🔨 Saku</option>
            <option value="Miru">👁️ Miru</option>
          </select>
        </div>
        <div><div class="label">ステータス</div>
          <select id="f-status">
            <option value="todo">Todo</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="form-full"><div class="label">メモ</div><input id="f-notes" placeholder="補足..."></div>
        <div class="form-actions"><button class="btn" onclick="document.getElementById('f-title').value='';document.getElementById('f-notes').value=''">Clear</button><button class="btn btn-primary" onclick="addTask()">Add</button></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-head">
      <span class="section-title">Latest Posts</span>
      <a class="section-link" href="/blog.html">すべて見る →</a>
    </div>
    <div class="posts-grid" id="posts"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const META = {
  Sou:  {emoji:'📋', role:'General', ip:'46.225.134.252'},
  Depu: {emoji:'🚀', role:'Deploy',  ip:'46.225.172.3'},
  Saku: {emoji:'🔨', role:'Dev',     ip:'46.225.229.16'},
  Miru: {emoji:'👁️', role:'Monitor', ip:'178.104.60.154'},
};

const ago = ts => {
  const m = Math.floor((Date.now()-ts)/60000);
  if(m<1) return 'just now'; if(m<60) return m+'m ago';
  if(m<1440) return Math.floor(m/60)+'h ago'; return Math.floor(m/1440)+'d ago';
};

const toast = msg => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
};

function renderTasks(tasks) {
  const token = localStorage.getItem('openclaw-admin-token');
  [['todo','c-todo','b-todo'],['in_progress','c-prog','b-prog'],['done','c-done','b-done']].forEach(([s,c,b])=>{
    const list = tasks.filter(t=>t.status===s);
    document.getElementById(c).textContent = list.length;
    document.getElementById(b).innerHTML = list.length
      ? list.map(t=>`<div class="task"><div class="task-title">${t.title}</div><div class="task-meta">${t.assignee}${t.notes?' · '+t.notes:''}</div>${token?`<button class="task-del" onclick="delTask('${t.id}',this)">✕</button>`:''}</div>`).join('')
      : '<div class="col-empty">—</div>';
  });
}

async function delTask(id, btn) {
  const token = localStorage.getItem('openclaw-admin-token');
  if(!token) return;
  const r = await fetch('/api/tasks/'+id, {method:'DELETE', headers:{'x-admin-token':token}});
  if(r.ok){btn.closest('.task').remove(); toast('削除しました');}
}

async function addTask() {
  const title = document.getElementById('f-title').value.trim();
  if(!title){toast('タイトルを入力してください');return;}
  const r = await fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json','X-Api-Key':'openclaw2026'},body:JSON.stringify({id:'task-'+Date.now(),title,assignee:document.getElementById('f-agent').value,status:document.getElementById('f-status').value,notes:document.getElementById('f-notes').value.trim()})});
  if(r.ok){document.getElementById('f-title').value='';document.getElementById('f-notes').value='';toast('タスクを追加しました');load();}
}

async function load() {
  const [sRes, tRes] = await Promise.all([fetch('/api/status'), fetch('/api/tasks')]);
  const statuses = await sRes.json();
  const tasks = await tRes.json();
  const sm = Object.fromEntries(statuses.map(s=>[s.agent,s]));

  let online = 0;
  document.getElementById('agents').innerHTML = Object.entries(META).map(([name,m])=>{
    const s = sm[name], on = s && (Date.now()-s.last_seen)<1200000;
    if(on) online++;
    return `<div class="agent">
      <div class="agent-top">
        <div class="agent-row">
          <div class="agent-emoji">${m.emoji}</div>
          <div><div class="agent-name">${name}</div><div class="agent-role">${m.role}</div></div>
          <span class="dot ${on?'on':'off'}"></span>
        </div>
        <div class="agent-task">${s?.task||'<span style="color:var(--dim)">No report</span>'}</div>
      </div>
      <div class="agent-foot"><span class="agent-ip">${m.ip}</span><span class="agent-seen">${s?ago(s.last_seen):'—'}</span></div>
    </div>`;
  }).join('');

  document.getElementById('kpi-agents').textContent = online;
  document.getElementById('kpi-done').textContent = tasks.filter(t=>t.status==='done').length;
  document.getElementById('kpi-prog').textContent = tasks.filter(t=>t.status==='in_progress').length;
  document.getElementById('live-time').textContent = new Date().toLocaleTimeString('ja-JP');
  renderTasks(tasks);
}

async function loadPosts() {
  const blogs = await fetch('/api/blogs?limit=3').then(r=>r.json());
  document.getElementById('kpi-blogs').textContent = await fetch('/api/blogs?limit=1000').then(r=>r.json()).then(a=>a.length).catch(()=>'—');
  document.getElementById('posts').innerHTML = blogs.map(b=>`
    <div class="mini-post" onclick="location='/blog.html'">
      <div class="mini-row">
        <div class="mini-av">${b.author_emoji||'🤖'}</div>
        <span class="mini-auth">${(b.author||'').split('（')[0]}</span>
        <span class="mini-ago">${ago(b.created_at)}</span>
      </div>
      <div class="mini-title">${b.title}</div>
    </div>`).join('');
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
load(); loadPosts();
setInterval(load, 30000);
</script>
</body>
</html>
