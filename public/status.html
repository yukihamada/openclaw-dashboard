<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Status — OpenClaw</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#060910;--surface:#0e1420;--surface2:#131c2e;--border:rgba(99,179,237,0.12);--accent:#63b3ed;--accent2:#a78bfa;--accent3:#34d399;--accent4:#f6ad55;--red:#fc8181;--text:#e2e8f0;--muted:#718096;--muted2:#4a5568;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;top:-30%;left:-10%;width:70vw;height:70vh;background:radial-gradient(ellipse,rgba(99,179,237,0.04) 0%,transparent 70%);pointer-events:none;z-index:0;}

header{position:sticky;top:0;z-index:100;background:rgba(6,9,16,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;gap:14px;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#63b3ed,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 20px rgba(99,179,237,0.3);}
.logo-text{font-size:15px;font-weight:600;color:var(--text);}
nav{margin-left:auto;display:flex;align-items:center;gap:2px;}
nav a{font-size:13px;color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:8px;transition:all 0.2s;white-space:nowrap;}
nav a:hover{color:var(--text);background:rgba(255,255,255,0.05);}
nav a.active{color:var(--accent);background:rgba(99,179,237,0.1);}

main{position:relative;z-index:1;padding:28px;max-width:800px;margin:0 auto;}

.page-title{font-size:24px;font-weight:700;margin-bottom:6px;}
.page-sub{font-size:14px;color:var(--muted);margin-bottom:28px;}

.summary-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;gap:16px;}
.summary-icon{font-size:28px;}
.summary-text{flex:1;}
.summary-headline{font-size:16px;font-weight:600;}
.summary-sub{font-size:13px;color:var(--muted);margin-top:2px;}
.summary-bar.all-up{border-color:rgba(52,211,153,0.3);background:rgba(52,211,153,0.05);}
.summary-bar.partial-down{border-color:rgba(246,173,85,0.3);background:rgba(246,173,85,0.05);}
.summary-bar.many-down{border-color:rgba(252,129,129,0.3);background:rgba(252,129,129,0.05);}

.services-table{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.services-head{display:grid;grid-template-columns:1fr 100px 90px 140px;gap:0;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface2);}
.services-head span{font-size:11px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;}
.service-row{display:grid;grid-template-columns:1fr 100px 90px 140px;gap:0;padding:14px 20px;border-bottom:1px solid var(--border);align-items:center;transition:background 0.2s;}
.service-row:last-child{border-bottom:none;}
.service-row:hover{background:rgba(255,255,255,0.02);}
.service-name{font-size:14px;font-weight:500;}
.service-url{font-size:11px;color:var(--muted2);margin-top:2px;font-family:monospace;}
.status-cell{display:flex;align-items:center;gap:7px;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dot-up{background:var(--accent3);box-shadow:0 0 7px var(--accent3);}
.dot-down{background:var(--red);box-shadow:0 0 7px var(--red);}
.dot-checking{background:var(--muted2);animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.status-label{font-size:13px;font-weight:500;}
.label-up{color:var(--accent3);}
.label-down{color:var(--red);}
.label-checking{color:var(--muted);}
.latency-cell{font-size:13px;color:var(--muted);font-family:monospace;}
.latency-fast{color:var(--accent3);}
.latency-slow{color:var(--accent4);}
.checked-cell{font-size:12px;color:var(--muted2);}

.refresh-row{display:flex;align-items:center;justify-content:space-between;margin-top:16px;}
.refresh-note{font-size:12px;color:var(--muted2);}
.btn-refresh{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all 0.2s;font-family:inherit;}
.btn-refresh:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}

@media(max-width:600px){
  header{padding:0 16px;}main{padding:16px;}
  nav a{padding:6px 8px;font-size:12px;}
  .services-head,.service-row{grid-template-columns:1fr 90px 80px;}
  .checked-cell{display:none;}
  .services-head span:last-child{display:none;}
}
</style>
</head>
<body>
<header>
  <a class="logo" href="/"><div class="logo-icon">🦞</div><span class="logo-text">OpenClaw</span></a>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/projects.html">Projects</a>
    <a href="/analytics.html">Analytics</a>
    <a href="/agent.html">Agents</a>
    <a href="/metrics.html">Metrics</a>
    <a href="/blog.html">Blog</a>
    <a href="/status.html" class="active">Status</a>
  </nav>
</header>

<main>
  <div class="page-title">Service Status</div>
  <div class="page-sub">Real-time health of all OpenClaw properties</div>

  <div class="summary-bar" id="summary-bar">
    <div class="summary-icon" id="summary-icon">⏳</div>
    <div class="summary-text">
      <div class="summary-headline" id="summary-headline">Checking services...</div>
      <div class="summary-sub" id="summary-sub">Fetching status from all endpoints</div>
    </div>
  </div>

  <div class="services-table">
    <div class="services-head">
      <span>Service</span>
      <span>Status</span>
      <span>Latency</span>
      <span>Last Checked</span>
    </div>
    <div id="services-body">
      <!-- rows injected by JS -->
    </div>
  </div>

  <div class="refresh-row">
    <span class="refresh-note" id="refresh-note">Auto-refreshes every 30s</span>
    <button class="btn-refresh" onclick="loadStatus()">Refresh now</button>
  </div>
</main>

<script>
const SERVICES = [
  { name: 'chatweb.ai',      url: 'https://chatweb.ai' },
  { name: 'teai.io',         url: 'https://teai.io' },
  { name: 'enablerdao.com',  url: 'https://enablerdao.com' },
  { name: 'jiuflow.art',     url: 'https://jiuflow.art' },
  { name: 'stayflowapp.com', url: 'https://stayflowapp.com' },
  { name: 'misebanai.com',   url: 'https://misebanai.com' },
  { name: 'banto.work',      url: 'https://banto.work' },
  { name: 'solun.art',       url: 'https://solun.art' },
  { name: 'elio.love',       url: 'https://elio.love' },
  { name: 'yukihamada.jp',   url: 'https://yukihamada.jp' },
];

function formatTime(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function latencyClass(ms) {
  if (!ms || ms >= 5000) return '';
  if (ms < 500) return 'latency-fast';
  if (ms < 2000) return '';
  return 'latency-slow';
}

function renderRows(healthData) {
  const body = document.getElementById('services-body');
  body.innerHTML = SERVICES.map(svc => {
    const h = healthData[svc.url];
    const isUp = h && h.status === 'up';
    const isDown = h && h.status === 'down';
    const latency = h ? h.latency : null;
    const checkedAt = h ? h.checked_at : null;
    const dotClass = !h ? 'dot-checking' : isUp ? 'dot-up' : 'dot-down';
    const labelClass = !h ? 'label-checking' : isUp ? 'label-up' : 'label-down';
    const labelText = !h ? 'Checking' : isUp ? 'Operational' : 'Down';
    const latencyText = latency != null ? `${latency}ms` : '—';
    return `<div class="service-row">
      <div>
        <div class="service-name">${svc.name}</div>
        <div class="service-url">${svc.url}</div>
      </div>
      <div class="status-cell">
        <span class="dot ${dotClass}"></span>
        <span class="status-label ${labelClass}">${labelText}</span>
      </div>
      <div class="latency-cell ${latencyClass(latency)}">${latencyText}</div>
      <div class="checked-cell">${formatTime(checkedAt)}</div>
    </div>`;
  }).join('');
}

function updateSummary(healthData) {
  const total = SERVICES.length;
  let up = 0, down = 0;
  SERVICES.forEach(svc => {
    const h = healthData[svc.url];
    if (h) {
      if (h.status === 'up') up++;
      else down++;
    }
  });
  const bar = document.getElementById('summary-bar');
  const icon = document.getElementById('summary-icon');
  const headline = document.getElementById('summary-headline');
  const sub = document.getElementById('summary-sub');

  bar.className = 'summary-bar';
  if (down === 0 && up > 0) {
    bar.classList.add('all-up');
    icon.textContent = '✅';
    headline.textContent = `All ${total} services operational`;
    sub.textContent = 'Everything is running smoothly.';
  } else if (down > 0 && down < total / 2) {
    bar.classList.add('partial-down');
    icon.textContent = '⚠️';
    headline.textContent = `${up} / ${total} services operational`;
    sub.textContent = `${down} service${down > 1 ? 's are' : ' is'} currently experiencing issues.`;
  } else if (down >= total / 2) {
    bar.classList.add('many-down');
    icon.textContent = '🔴';
    headline.textContent = `${up} / ${total} services operational`;
    sub.textContent = 'Multiple services are down. Investigation underway.';
  } else {
    icon.textContent = '⏳';
    headline.textContent = 'Checking services...';
    sub.textContent = 'Fetching status from all endpoints';
  }
}

async function loadStatus() {
  try {
    const res = await fetch('/api/health');
    const data = await res.json();
    renderRows(data);
    updateSummary(data);
    document.getElementById('refresh-note').textContent =
      `Last updated: ${new Date().toLocaleTimeString('en-GB')} — auto-refreshes every 30s`;
  } catch (e) {
    document.getElementById('summary-headline').textContent = 'Failed to load status';
  }
}

loadStatus();
setInterval(loadStatus, 30000);
</script>
</body>
</html>
