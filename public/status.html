<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status — OpenClaw</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#09090b;--surface:#18181b;--border:#27272a;--text:#fafafa;--muted:#a1a1aa;--dim:#52525b;--green:#22c55e;--red:#ef4444;--yellow:#eab308;}
body{font-family:'Geist','Noto Sans JP',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
nav{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:20px;position:sticky;top:0;background:rgba(9,9,11,0.92);backdrop-filter:blur(12px);z-index:50;}
.logo{font-size:14px;font-weight:600;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px;}
.nav-links{display:flex;gap:2px;}
.nav-links a{font-size:13px;color:var(--muted);text-decoration:none;padding:5px 10px;border-radius:6px;transition:color 0.15s;}
.nav-links a:hover,.nav-links a.active{color:var(--text);}
.page{max-width:700px;margin:0 auto;padding:48px 24px 80px;}
.page-title{font-size:20px;font-weight:600;letter-spacing:-0.3px;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.summary{display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:8px;border:1px solid var(--border);margin-bottom:24px;background:var(--surface);}
.summary.all-up{border-color:rgba(34,197,94,0.3);background:rgba(34,197,94,0.05);}
.summary.partial{border-color:rgba(234,179,8,0.3);background:rgba(234,179,8,0.05);}
.summary-icon{font-size:18px;}
.summary-text{font-size:13px;font-weight:500;}
.summary-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.section-title{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.services{border-top:1px solid var(--border);margin-bottom:32px;}
.svc-row{display:grid;grid-template-columns:1fr 80px 90px;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);align-items:center;}
.svc-row:last-child{border-bottom:none;}
.svc-name{font-size:13px;font-weight:500;}
.svc-url{font-size:11px;color:var(--dim);margin-top:2px;}
.svc-status{display:flex;align-items:center;gap:6px;font-size:12px;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot.up{background:var(--green);}
.dot.down{background:var(--red);}
.dot.slow{background:var(--yellow);}
.dot.checking{background:var(--dim);animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.svc-latency{font-size:12px;color:var(--dim);text-align:right;}
.updated{font-size:11px;color:var(--dim);margin-top:16px;text-align:center;}
@media(max-width:600px){nav{padding:0 16px;}.page{padding:32px 16px 60px;}.svc-row{grid-template-columns:1fr 70px;}.svc-latency{display:none;}}
</style>
</head>
<body>
<nav>
  <a class="logo" href="/"><span>🦞</span> OpenClaw</a>
  <div class="nav-links">
    <a href="/">Dashboard</a>
    <a href="/projects.html">Projects</a>
    <a href="/analytics.html">Analytics</a>
    <a href="/blog.html">Blog</a>
    <a href="/status.html" class="active">Status</a>
  </div>
</nav>

<div class="page">
  <div class="page-title">Service Status</div>
  <div class="page-sub" id="sub">確認中...</div>

  <div class="summary" id="summary">
    <div class="summary-icon">⏳</div>
    <div>
      <div class="summary-text">確認中</div>
      <div class="summary-sub">サービス状態を取得しています...</div>
    </div>
  </div>

  <div class="section-title">プロダクト</div>
  <div class="services" id="products-list"></div>

  <div class="section-title">インフラ / エージェント</div>
  <div class="services" id="infra-list"></div>

  <div class="updated" id="updated"></div>
</div>

<script>
const PRODUCTS = [
  {name:'chatweb.ai', url:'https://chatweb.ai'},
  {name:'teai.io', url:'https://teai.io'},
  {name:'StayFlow', url:'https://stayflowapp.com'},
  {name:'BANTO', url:'https://banto.work'},
  {name:'JiuFlow', url:'https://jiuflow.art'},
  {name:'EnablerDAO', url:'https://enablerdao.com'},
];

const AGENTS = [
  {name:'Sou 📋 (46.225.134.252)', url:'https://openclaw-dashboard-still-sun-5403.fly.dev/api/status'},
  {name:'OpenClaw Dashboard', url:'https://openclaw-dashboard-still-sun-5403.fly.dev/api/health'},
];

const ago = ts => {
  const m = Math.floor((Date.now()-ts)/60000);
  if(m<1) return 'たった今'; if(m<60) return m+'分前';
  if(m<1440) return Math.floor(m/60)+'時間前'; return Math.floor(m/1440)+'日前';
};

function dotClass(status, latency) {
  if (status !== 'up') return 'down';
  if (latency > 2000) return 'slow';
  return 'up';
}
function statusLabel(status, latency) {
  if (status !== 'up') return 'ダウン';
  if (latency > 2000) return '低速';
  return '稼働中';
}

function renderRows(services, containerId) {
  document.getElementById(containerId).innerHTML = services.map(s => {
    const cls = dotClass(s.status, s.latency);
    const label = statusLabel(s.status, s.latency);
    const lat = s.latency ? s.latency+'ms' : '—';
    const name = s.name || (s.url||'').replace('https://','').split('/')[0];
    const url = s.url ? s.url.replace('https://','') : '';
    return `<div class="svc-row">
      <div>
        <div class="svc-name">${name}</div>
        <div class="svc-url">${url}</div>
      </div>
      <div class="svc-status">
        <span class="dot ${cls}"></span>
        <span>${label}</span>
      </div>
      <div class="svc-latency">${lat}</div>
    </div>`;
  }).join('');
}

async function load() {
  const health = await fetch('/api/health').then(r=>r.json()).catch(()=>({}));
  const services = Array.isArray(health) ? health : (health.services || []);
  const agents = Array.isArray(health) ? [] : (health.agents || []);

  // Match products to health data
  const prodStatus = PRODUCTS.map(p => {
    const domain = p.url.replace('https://','').split('/')[0];
    const svc = services.find(s => s.url && s.url.includes(domain));
    return {
      name: p.name,
      url: p.url,
      status: svc ? svc.status : 'unknown',
      latency: svc ? svc.latency : 0,
    };
  });

  const upCount = prodStatus.filter(s=>s.status==='up').length;
  const allUp = upCount === prodStatus.length;
  const summaryEl = document.getElementById('summary');
  summaryEl.className = 'summary ' + (allUp ? 'all-up' : 'partial');
  summaryEl.innerHTML = `
    <div class="summary-icon">${allUp ? '✅' : '⚠️'}</div>
    <div>
      <div class="summary-text">${allUp ? 'すべてのサービスが稼働中' : upCount + '/' + prodStatus.length + ' サービス稼働中'}</div>
      <div class="summary-sub">${allUp ? '正常に動作しています' : '一部のサービスに問題があります'}</div>
    </div>`;

  document.getElementById('sub').textContent = `最終確認 ${ago(Date.now())}`;

  renderRows(prodStatus, 'products-list');

  // Infra / agents
  const infraRows = agents.map(a => ({
    name: `${a.emoji||''} ${a.name}`,
    url: a.ip || '',
    status: a.status === 'online' ? 'up' : 'down',
    latency: 0,
  }));
  if (infraRows.length > 0) renderRows(infraRows, 'infra-list');
  else document.getElementById('infra-list').innerHTML = '<div style="padding:16px 0;font-size:13px;color:var(--dim)">エージェントデータなし</div>';

  document.getElementById('updated').textContent = `最終更新: ${new Date().toLocaleTimeString('ja-JP')}`;
}
load();
</script>
</body>
</html>
